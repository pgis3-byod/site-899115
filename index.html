<style>


#batteryWidget {
  position: fixed;
  top: 10px;
  right: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  color: white;
  font-family: sans-serif;
  font-size: 14px;
  z-index: 9999;
}

.battery-icon {
  width: 24px;
  height: 24px;
}
</style>

<script>
async function initBattery() {
  if (!navigator.getBattery) {
    document.getElementById("batteryText").textContent = "N/A";
    return;
  }

  const battery = await navigator.getBattery();

  function update() {
    const level = Math.round(battery.level * 100);

    document.getElementById("batteryText").textContent = level + "%";

    const fill = document.getElementById("batteryLevel");
    fill.setAttribute("width", (level / 100) * 16.5);
  }

  update();

  battery.addEventListener("levelchange", update);
  battery.addEventListener("chargingchange", update);
}

initBattery();
</script>
  
<div id="fps-counter">FPS: N/A</div>

<style>
#fps-counter{
    position: fixed;
  top: 35px;
  right: 15px;
  display: flex;
  align-items: center;
  gap: 6px;
  color: white;
  font-family: sans-serif;
  font-size: 14px;
  z-index: 9999;
}
</style>

<script>
(() => {
    const fpsCounter = document.getElementById("fps-counter");

    let frames = 0;
    let lastTime = performance.now();

    function loop(now) {
        frames++;

        if (now >= lastTime + 1000) {
            const fps = Math.round((frames * 1000) / (now - lastTime));
            fpsCounter.textContent = `FPS: ${fps}`;
            frames = 0;
            lastTime = now;
        }

        requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
})();
</script>
